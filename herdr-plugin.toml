id = "layouts"
name = "Pane Layouts"
version = "0.1.1"
min_herdr_version = "0.7.0"
description = "Seamless tmux-style pane resizing and layouts for Herdr."
platforms = ["linux", "macos"]

[[actions]]
id = "equalize"
title = "Pane Layouts: equalize"
description = "Arrange the current tab as equal-width vertical columns."
contexts = ["tab", "pane"]
command = ["python3", "src/cli.py", "equalize"]

[[actions]]
id = "cycle"
title = "Pane Layouts: cycle"
description = "Cycle the current tab through useful layout presets."
contexts = ["tab", "pane"]
command = ["python3", "src/cli.py", "cycle"]

[[actions]]
id = "resize-left"
title = "Pane Layouts: resize left"
description = "Resize the current pane left by two percent."
contexts = ["pane"]
command = ["python3", "src/cli.py", "resize-left"]

[[actions]]
id = "resize-down"
title = "Pane Layouts: resize down"
description = "Resize the current pane down by two percent."
contexts = ["pane"]
command = ["python3", "src/cli.py", "resize-down"]

[[actions]]
id = "resize-up"
title = "Pane Layouts: resize up"
description = "Resize the current pane up by two percent."
contexts = ["pane"]
command = ["python3", "src/cli.py", "resize-up"]

[[actions]]
id = "resize-right"
title = "Pane Layouts: resize right"
description = "Resize the current pane right by two percent."
contexts = ["pane"]
command = ["python3", "src/cli.py", "resize-right"]
